<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STORE · KAOSU PACKING</title>
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0f172a;
      --glass:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#22c55e;
      --accent2:#38bdf8;
      /* เงาวงด้านบน ใช้เฉพาะโหมดมืด */
      --header-shadow: radial-gradient(900px 500px at top, #1e293b 0%, transparent 60%);
    }

    /* Light mode */
    body.light{
      --bg1:#f5f7fa;
      --bg2:#e2e8f0;
      --glass:rgba(255,255,255,.96);
      --border:rgba(15,23,42,.10);
      --text:#0f172a;
      --muted:#64748b;
      --header-shadow:none;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Arial;
      color:var(--text);
      background:
        var(--header-shadow),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      transition:background .25s ease,color .25s ease;
    }

    /* ปุ่มสลับธีม */
    .toggle-theme{
      position:fixed;
      top:16px;
      right:16px;
      z-index:2000;
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      backdrop-filter:blur(10px);
      font-size:13px;
    }

    /* ปุ่มเลือกภาษา ข้างๆ ปุ่มธีม */
    .lang-switch{
      position:fixed;
      top:16px;
      right:120px;
      z-index:2000;
      padding:6px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      font-size:12px;
      backdrop-filter:blur(8px);
    }

    body.light .lang-switch{
      background:rgba(255,255,255,.95);
      border-color:rgba(15,23,42,.15);
    }

    /* ===== TOP BAR ===== */
    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      backdrop-filter: blur(14px);
      background:rgba(2,6,23,.65);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    body.light .topbar{
      background: rgba(255,255,255,0.72);
      border-bottom: 1px solid rgba(0,0,0,0.12);
      backdrop-filter: blur(18px);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:14px 16px 12px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    /* Back */
    .back-btn{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.10);
      color:#fff;
      cursor:pointer;
    }
    .back-btn:hover{ filter:brightness(1.06); }

    body.light .back-btn{
      background: rgba(255,255,255,0.55);
      color: #0f172a;
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* Brand */
    .brand{
      margin-left:auto;
      text-align:right;
    }
    .brand .h1{
      font-weight:900;
      letter-spacing:.6px;
      font-size:14px;
    }
    .brand .sub{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
    }

    /* ===== SEARCH AREA ===== */
    .search-area{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    /* Search row: input + button */
    .search-row{
      display:grid;
      grid-template-columns: 1fr 160px;
      gap:12px;
      align-items:stretch;
    }

    .search-row input{
      width:100%;
      height:56px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      padding:0 18px;
      font-size:16px;
      -webkit-appearance:none;
      appearance:none;
      outline:none;
    }
    .search-row input::placeholder{ color:var(--muted); }

    /* Buttons */
    .btn{
      height:56px;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      width:100%;
      display:block;
      text-align:center;
      line-height:56px;
      font-weight:900;
      font-size:16px;
      letter-spacing:.3px;
      white-space:nowrap;
      color:#fff;
      box-shadow:0 14px 36px rgba(0,0,0,.35);
      transition:transform .15s ease, filter .15s ease;
    }
    .btn:hover{ filter:brightness(1.06); }
    .btn:active{ transform:scale(.98); }
    .btn.search{ background:linear-gradient(135deg,#34d399,var(--accent)); }
    .btn.issue-main{ background:linear-gradient(135deg,#f97373,#e11d48); }

    body.light .search-row input{
      background:#ffffff;
      color:var(--text);
      border-color:rgba(148,163,184,.7);
    }

    /* Status */
    .status{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    body.light .status{ color:#1e293b; }

    /* Mobile toggle (arrow) */
    .mobile-toggle{
      display:none;
      width:100%;
      margin-top:10px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      font-weight:900;
      letter-spacing:.3px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }
    .mobile-toggle:hover{ filter:brightness(1.06); }

    /* Desktop fine-tune */
    @media (min-width: 900px){
      .search-row{ grid-template-columns: 1fr 170px; }
      .btn{ font-size:15px; }
    }

    /* Mobile */
    @media (max-width: 480px){
      .search-row{ grid-template-columns: 1fr 96px; }
      .search-row input{ font-size:17px; height:58px; }
      .btn{ font-size:17px; height:58px; min-height:58px; line-height:58px; }
      .mobile-toggle{ display:block; }

      /* collapse behaviour */
      body.mobile-collapsed #searchArea{ display:none; }
    }

    /* ===== GRID ===== */
    .grid{
      max-width:1200px;
      margin:0 auto;
      padding:16px 16px 34px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap:16px;
    }

    /* ===== CARD ===== */
    .card{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 20px 55px rgba(0,0,0,.45);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 26px 70px rgba(0,0,0,.55);
    }
    body.light .card{ box-shadow:0 12px 30px rgba(15,23,42,.12); }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .loc{
      font-size:18px;
      font-weight:900;
      letter-spacing:.5px;
      color:var(--accent);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#fff;
    }
    .badge.ok{ color:#bbf7d0; border-color:rgba(34,197,94,.35); }
    .badge.ng{ color:#fecaca; border-color:rgba(239,68,68,.35); }

    body.light .badge{
      background:rgba(59,130,246,.12);
      border-color:rgba(37,99,235,.3);
      color:#1e293b;
    }
    body.light .badge.ok{
      background:rgba(34,197,94,.12);
      border-color:rgba(22,163,74,.4);
      color:#14532d;
    }
    body.light .badge.ng{
      background:rgba(248,113,113,.12);
      border-color:rgba(220,38,38,.4);
      color:#7f1d1d;
    }

    .field{
      margin:6px 0;
      font-size:14px;
      color:#dbeafe;
    }
    .field span.label{
      color:var(--muted);
      margin-right:6px;
    }

    /* ทำให้ช่อง “ลูกค้า:” และ “งาน:” ชัดขึ้นใน Light Mode */
    body.light .field{ color:#0f172a; }
    body.light .field span.label{ color:#334155; }

    /* Layout image */
    .thumb{
      margin-top:12px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.15);
    }
    .thumb img{
      width:100%;
      height:190px;
      object-fit:cover;
      display:block;
      cursor:pointer;
    }

    /* Card actions */
    .card-actions{
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
    }
    .card-actions .report-btn{
      height:38px;
      padding:0 16px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      background:linear-gradient(135deg,#f97373,#e11d48);
      color:#fff;
      box-shadow:0 12px 30px rgba(0,0,0,.45);
    }
    .card-actions .report-btn:hover{ filter:brightness(1.06); }

    /* Highlight */
    mark{
      background:rgba(56,189,248,.25);
      color:#e0f2fe;
      padding:0 3px;
      border-radius:6px;
    }

    /* Modal */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .modal img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:14px;
      box-shadow:0 24px 70px rgba(0,0,0,.6);
    }
    .modal .close{
      position:fixed;
      top:18px;
      right:18px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
    }
    body.light .modal .close{
      background:rgba(15,23,42,.8);
      border-color:rgba(15,23,42,.7);
    }

    /* Loading overlay */
    .loading{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.70);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9000;
    }
    .loading .box{ text-align:center; }
    .loading .logo{
      width:92px;
      filter: drop-shadow(0 0 18px rgba(56,189,248,.35));
      animation:breath 2.2s ease-in-out infinite;
    }
    @keyframes breath{
      0%,100%{ opacity:.55; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.03); }
    }
    .loading .txt{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
    }

    /* REPORT MODAL */
    .report-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:40000;
    }
    .report-modal{
      width:380px;
      max-width:92vw;
      background:rgba(255,255,255,.96);
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .report-header{
      padding:14px 16px;
      font-size:18px;
      font-weight:900;
      background:#0b1220;
      color:#e5e7eb;
      border-bottom:1px solid rgba(0,0,0,.25);
    }
    .report-body{
      padding:14px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .report-body label{ font-size:13px; font-weight:800; color:#111827; }
    .report-body input,.report-body textarea{
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:9px 10px;
      font-size:14px;
      outline:none;
    }
    .report-body textarea{ min-height:80px; resize:none; }
    .report-options{ display:flex; flex-direction:column; gap:6px; font-size:14px; color:#111827; }
    .report-footer{
      display:flex;
      gap:10px;
      padding:12px 16px;
      border-top:1px solid #e5e7eb;
    }
    .report-footer button{ flex:1; height:40px; border-radius:10px; border:1px solid rgba(0,0,0,.08); cursor:pointer; }
    .hide-location{ display:none!important; }
    body.light .report-modal{ background:#ffffff; }
  </style>
</head>
<body>
  <button class="toggle-theme" onclick="toggleTheme()">🌙 / 🔆</button>
  <select id="langSwitcher" class="lang-switch" onchange="setLang(this.value)">
    <option value="th">🇹🇭 TH</option>
    <option value="mm">🇲🇲 MM</option>
    <option value="cn">🇹🇼 繁體</option>
  </select>

  <div class="topbar">
    <div class="wrap">
      <div class="row">
        <button class="back-btn" onclick="location.href='index.html'">⬅ เมนูหลัก</button>
        <div class="brand">
          <div class="h1">KAOSU PACKING</div>
          <div class="sub">Smart Warehouse · Prachinburi Branch</div>
        </div>
      </div>

      <!-- SEARCH AREA (collapsible on mobile) -->
      <div id="searchArea" class="search-area">
        <div class="search-row">
          <input id="q" type="search" placeholder="ค้นหา Location / งาน / ลูกค้า เช่น A2-54, CL-066, K5581">
          <button class="btn search" id="btnSearch">ค้นหา</button>
        </div>

        <button class="btn issue-main" id="btnReportMain">🚨 แจ้งปัญหา (งานนอกฐาน)</button>

        <div class="status">
          <div id="note">พร้อมใช้งาน</div>
          <div>ผลลัพธ์: <b id="count">0</b> รายการ</div>
        </div>
      </div>

      <!-- Mobile collapse/expand arrow (only mobile) -->
      <button id="toggleSearchMobile" class="mobile-toggle" type="button" aria-expanded="true">⌃</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modal" id="modal" onclick="closeModal()">
    <button class="close" onclick="closeModal(); event.stopPropagation();">✕ ปิด</button>
    <img id="modalImg" alt="พรีวิว">
  </div>

  <div class="loading" id="loading">
    <div class="box">
      <img class="logo" src="assets/logo.png" alt="Kaosu Logo">
      <div class="txt">กำลังโหลดข้อมูลคลังอัจฉริยะ…</div>
    </div>
  </div>

  <!-- REPORT ISSUE MODAL -->
  <div class="report-overlay" id="reportOverlay" onclick="closeReportModal()">
    <div class="report-modal" onclick="event.stopPropagation()">
      <div class="report-header">🚨 แจ้งปัญหา</div>
      <div class="report-body">
        <label>Location / งาน</label>
        <input id="reportItem" placeholder="เช่น A1-01 / Part Name">

        <div class="hide-location">
          <label>Location</label>
          <input id="reportLocation" placeholder="Location (ถ้ามี)">
        </div>

        <label>ประเภทปัญหา</label>
        <div class="report-options">
          <label><input type="radio" name="reportType" value="ตำแหน่งไม่ตรง"> ตำแหน่งไม่ตรง</label>
          <label><input type="radio" name="reportType" value="ปริ้น WI"> ปริ้น WI</label>
          <label><input type="radio" name="reportType" value="อื่นๆ"> อื่นๆ</label>
        </div>

        <label>รายละเอียดเพิ่มเติม</label>
        <textarea id="reportDetail" placeholder="รายละเอียดปัญหา เช่น ผังไม่ตรงของจริง, ผังไม่ชัด, ฯลฯ"></textarea>
      </div>
      <div class="report-footer">
        <button type="button" onclick="closeReportModal()">ยกเลิก</button>
        <button type="button" onclick="submitReport()">ส่งแจ้งปัญหา</button>
      </div>
    </div>
  </div>

  <script>
    // ===== THEME GLOBAL =====
    (function(){
      const theme = localStorage.getItem("theme") || "dark";
      if(theme === "light") document.body.classList.add("light");
    })();

    function toggleTheme(){
      if(document.body.classList.contains("light")){
        document.body.classList.remove("light");
        localStorage.setItem("theme","dark");
      }else{
        document.body.classList.add("light");
        localStorage.setItem("theme","light");
      }
    }

    // ===== LANGUAGE GLOBAL =====
    function applyLangFromStorage(){
      const lang = localStorage.getItem("lang") || "th";
      const sel = document.getElementById("langSwitcher");
      if(sel) sel.value = lang;
    }
    function setLang(code){
      localStorage.setItem("lang", code);
      // ยังไม่ได้ทำการแปลข้อความในหน้า (เก็บค่าไว้ก่อน)
    }

    // ===================== CONFIG =====================
    const API_BASE = "https://script.google.com/macros/s/AKfycbwi367iEscZhY4E_o9TI8FeIRsTBVkN5yjedzMkmjOyH_xEgQp-2Lgw8bP13mDapBao9w/exec";
    const LIMIT = 200;

    // ===================== ELEMENTS =====================
    const grid = document.getElementById("grid");
    const note = document.getElementById("note");
    const count = document.getElementById("count");
    const qEl = document.getElementById("q");
    const loading = document.getElementById("loading");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const btnSearch = document.getElementById("btnSearch");
    const btnReportMain = document.getElementById("btnReportMain");
    const reportOverlay = document.getElementById("reportOverlay");
    const reportItem = document.getElementById("reportItem");
    const reportLocation = document.getElementById("reportLocation");
    const reportDetail = document.getElementById("reportDetail");

    // Mobile collapse
    const toggleBtn = document.getElementById("toggleSearchMobile");

    // ===================== STATE =====================
    let ALL = [];
    let VIEW = [];
    let fetching = false;
    let CURRENT_REPORT = null;

    // ===================== HELPERS =====================
    const ok = v => {
      const t = String(v ?? "").trim();
      return t !== "" && t !== "#N/A";
    };

    function showLoading(){ loading.style.display="flex"; }
    function hideLoading(){ loading.style.display="none"; }

    function escapeHtml(s){
      return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/\"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function escapeRegExp(s){
      return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlight(text, q){
      const t = String(text ?? "");
      const qq = String(q ?? "").trim();
      if(!qq) return escapeHtml(t);
      const re = new RegExp(escapeRegExp(qq), "ig");
      return escapeHtml(t).replace(re, m => `<mark>${escapeHtml(m)}</mark>`);
    }

    // ===================== JSONP =====================
    function jsonp(url){
      return new Promise((resolve,reject)=>{
        const cb = "cb_" + Math.random().toString(36).slice(2);
        const s = document.createElement("script");
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 15000);

        function cleanup(){
          clearTimeout(timer);
          try { delete window[cb]; } catch(e) {}
          try { s.remove(); } catch(e) {}
        }

        window[cb] = (d) => { cleanup(); resolve(d); };
        s.onerror = () => {
          console.error("JSONP LOAD ERROR URL:", s.src);
          cleanup();
          reject(new Error("JSONP failed"));
        };
        s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
        document.body.appendChild(s);
      });
    }

    // ===================== MODAL =====================
    function openModal(src){
      modalImg.src = String(src || "");
      modal.style.display = "flex";
    }
    function closeModal(){
      modal.style.display = "none";
      modalImg.src = "";
    }

    // ===================== REPORT MODAL =====================
    function openReportModal(itemEncoded){
      try{
        const it = JSON.parse(decodeURIComponent(itemEncoded));
        CURRENT_REPORT = it;
        const loc = it.location_code || "";
        const part = it.part_name || "";
        reportItem.value = loc ? `${loc} / ${part}` : part;
        reportLocation.value = loc;
      }catch(e){
        CURRENT_REPORT = null;
        reportItem.value = "";
        reportLocation.value = "";
      }

      document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
      reportDetail.value = "";
      reportOverlay.style.display = "flex";
    }

    function openReportModalManual(){
      CURRENT_REPORT = null;
      reportItem.value = (qEl.value || "").trim();
      reportLocation.value = "";
      document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
      reportDetail.value = "";
      reportOverlay.style.display = "flex";
    }

    function closeReportModal(){
      reportOverlay.style.display = "none";
      CURRENT_REPORT = null;
    }

    async function submitReport(){
      const type = document.querySelector('input[name="reportType"]:checked')?.value || "";
      const item = reportItem.value || "";
      const location = reportLocation.value || "";
      const detail = reportDetail.value || "";

      if(!item && !detail){
        alert("กรุณาระบุอย่างน้อยชื่อ Location/งาน หรือรายละเอียดปัญหา");
        return;
      }

      const page = "Store";
      const url =
        API_BASE +
        "?action=report" +
        "&item=" + encodeURIComponent(item) +
        "&location=" + encodeURIComponent(location) +
        "&type=" + encodeURIComponent(type) +
        "&detail=" + encodeURIComponent(detail) +
        "&page=" + encodeURIComponent(page);

      try{
        showLoading();
        const res = await jsonp(url);
        hideLoading();
        closeReportModal();

        if(res && res.ok === true && res.saved === true){
          alert("ส่งแจ้งปัญหาเรียบร้อย ✅" + (res.lineSent ? "\nLINE ส่งแล้ว ✅" : "\nLINE ยังไม่ส่ง ⚠️"));
        }else{
          alert("ส่งไม่สำเร็จ ❌\n" + JSON.stringify(res));
        }
      }catch(err){
        hideLoading();
        alert("เรียกหลังบ้านไม่สำเร็จ ❌\n" + err.message);
      }
    }

    // ===================== UI =====================
    function card(it, q){
      const loc = it.location_code || "-";
      const customer = it.customer_code || "";
      const part = it.part_name || "";
      const hasLayout = ok(it.layout_image_url);

      return `
        <div class="card">
          <div class="head">
            <div class="loc">${highlight(loc, q)}</div>
            <div class="badge ${hasLayout ? 'ok' : 'ng'}">${hasLayout ? 'มีผัง' : 'ไม่มีผัง'}</div>
          </div>
          <div class="field"><span class="label">ลูกค้า:</span> <b>${highlight(customer, q)}</b></div>
          <div class="field"><span class="label">งาน:</span> <b>${highlight(part, q)}</b></div>
          ${hasLayout ? `
            <div class="thumb">
              <img src="${it.layout_image_url}" alt="layout" onclick="openModal('${it.layout_image_url}')">
            </div>
          ` : ''}
          <div class="card-actions">
            <button class="report-btn" onclick="openReportModal('${encodeURIComponent(JSON.stringify(it))}')">🚨 แจ้งปัญหา</button>
          </div>
        </div>
      `;
    }

    function render(q=""){
      grid.innerHTML = "";
      VIEW.forEach(it => grid.insertAdjacentHTML("beforeend", card(it, q)));
      count.textContent = VIEW.length;
      note.textContent = q ? `ผลการค้นหา "${q}" (${VIEW.length} รายการ)` : `แสดงทั้งหมด (${VIEW.length} รายการ)`;
    }

    // ===================== DATA LOAD =====================
    async function loadAll(){
      if(fetching) return;
      fetching = true;
      showLoading();
      note.textContent = "กำลังโหลด...";
      grid.innerHTML = "";
      count.textContent = "0";

      try{
        let offset = 0;
        let finished = false;
        let all = [];

        while(!finished){
          const v = Date.now();
          const url = `${API_BASE}?action=list&limit=${LIMIT}&offset=${offset}&v=${v}`;
          const r = await jsonp(url);
          const items = (r && (r.items || r.results)) ? (r.items || r.results) : [];

          all = all.concat(items);
          offset += items.length;
          if(items.length < LIMIT) finished = true;

          await new Promise(res => setTimeout(res, 40));
        }

        ALL = all.map(x => ({
          location_code: x.location_code || "",
          customer_code: x.customer_code || "",
          part_name: x.part_name || "",
          layout_image_url: x.layout_image_url || ""
        }));

        VIEW = ALL;
        render("");
      }catch(err){
        note.textContent = "โหลดไม่สำเร็จ: " + err.message;
        console.error(err);
      }finally{
        hideLoading();
        fetching = false;
      }
    }

    async function doSearch(){
      const qv = (qEl.value || "").trim();

      // ตามที่ขอ: ถ้าช่องว่างแล้วกดค้นหา => แสดงทั้งหมด
      if(!qv){
        await loadAll();
        return;
      }

      showLoading();
      note.textContent = "กำลังค้นหา...";
      grid.innerHTML = "";
      count.textContent = "0";

      try{
        const v = Date.now();
        const url = `${API_BASE}?action=search&q=${encodeURIComponent(qv)}&v=${v}`;
        const r = await jsonp(url);
        const items = (r && (r.items || r.results)) ? (r.items || r.results) : [];

        ALL = items.map(x => ({
          location_code: x.location_code || "",
          customer_code: x.customer_code || "",
          part_name: x.part_name || "",
          layout_image_url: x.layout_image_url || ""
        }));

        VIEW = ALL;
        render(qv);
      }catch(err){
        note.textContent = "ค้นหาไม่สำเร็จ: " + err.message;
        console.error(err);
      }finally{
        hideLoading();
      }
    }

    // ===================== EVENTS =====================
    btnSearch.onclick = async () => {
      await doSearch();
    };

    btnReportMain.onclick = () => {
      openReportModalManual();
    };

    qEl.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        btnSearch.click();
      }
    });

    // Mobile collapse/expand (เฉพาะมือถือ)
    if(toggleBtn){
      toggleBtn.onclick = () => {
        document.body.classList.toggle("mobile-collapsed");
        const collapsed = document.body.classList.contains("mobile-collapsed");
        toggleBtn.textContent = collapsed ? "⌄" : "⌃";
        toggleBtn.setAttribute("aria-expanded", collapsed ? "false" : "true");
      };
    }

    // START
    applyLangFromStorage();
    loadAll();
  </script>
</body>
</html>
