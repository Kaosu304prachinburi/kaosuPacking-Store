<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PACKING | KAOSU PACKING</title>

<style>
/* ===== THEME (Dark/Light Global) ===== */
:root{
  --bg1:#020617;
  --bg2:#0f172a;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.18);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --accent2:#38bdf8;
  --blue:#3b82f6;
  --warn:#f59e0b;
  --danger:#ef4444;

  /* เงาวงด้านบน ใช้เฉพาะโหมดมืด */
  --header-shadow: radial-gradient(900px 500px at top, #1e293b 0%, transparent 60%);
}

/* Light mode */
body.light{
  --bg1:#f5f7fa;
  --bg2:#e2e8f0;
  --glass:rgba(255,255,255,.96);
  --border:rgba(15,23,42,.08);
  --text:#0f172a;
  --muted:#64748b;

  /* ตัดเงาวงออกในโหมดสว่าง */
  --header-shadow:none;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Arial;
  color:var(--text);
  background:
    var(--header-shadow),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  transition:background .25s ease,color .25s ease;
}

/* ปุ่มสลับธีมลอยมุมขวาบน */
.toggle-theme{
  position:fixed;
  top:16px;
  right:16px;
  z-index:9999;
  padding:8px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--glass);
  color:var(--text);
  cursor:pointer;
  backdrop-filter:blur(8px);
  font-size:13px;
}
.toggle-theme:hover{ filter:brightness(1.05); }

.wrap{max-width:1200px;margin:auto;padding:16px}

/* ===== BACK BUTTON ===== */
.back-fixed{
  position:fixed;
  top:16px;
  left:16px;
  z-index:9999;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(8px);
}
.back-fixed:hover{ filter:brightness(1.06); }

/* ===== HEADER ===== */
.header{display:flex;align-items:center;gap:12px;margin:6px 0 14px}
.logo{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  overflow:hidden;
}
.logo img{max-width:80%;max-height:80%}
.title{font-size:18px;font-weight:900;letter-spacing:.3px}
.subtitle{font-size:12px;color:var(--muted);margin-top:2px}

/* ===== SEARCH ===== */
.search-card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  backdrop-filter: blur(14px);
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.row{display:flex;gap:8px;flex-wrap:wrap}

/* input/button unified sizing */
input,button{height:48px;border-radius:14px;padding:0 14px;font-size:15px}
input{
  flex:1;
  min-width:260px; /* กันเบียดบนจอแคบ */
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.07);
  color:#fff;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
}
input::placeholder{color:var(--muted)}
input:focus{border-color:rgba(56,189,248,.45);box-shadow:0 0 0 3px rgba(56,189,248,.18)}

button.primary{
  background:linear-gradient(135deg,#34d399,var(--accent));
  color:#fff;border:none;cursor:pointer;
  font-weight:900;letter-spacing:.2px;
  box-shadow:0 14px 36px rgba(0,0,0,.35);
  white-space:nowrap;
}
button.primary:hover{filter:brightness(1.06)}

button.secondary{
  background:rgba(96,165,250,.16);
  color:#bfdbfe;
  border:1px solid rgba(96,165,250,.25);
  cursor:pointer;
  font-weight:900;
  white-space:nowrap;
}
button.secondary:hover{filter:brightness(1.06)}

button.ghost{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
button.ghost:hover{filter:brightness(1.06)}

/* ปุ่มยาว “แจ้งปัญหา(งานไม่อยู่ในฐาน)” ให้ขึ้นบรรทัดใหม่บนคอม */
#btnReportMain{ flex-basis:100%; }

/* ===== FILTER BAR ===== */
.filter-bar{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center
}
.filter-bar button{
  height:40px;padding:0 14px;border-radius:999px;font-size:14px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.06);
  color:#fff;
  cursor:pointer;
  display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.filter-bar button span{font-weight:900}
.filter-bar button.active{
  background:rgba(56,189,248,.18)!important;
  border-color:rgba(56,189,248,.35)!important;
}
.small-note{font-size:12px;color:var(--muted);margin-left:auto}

/* ===== GRID ===== */
.grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}

/* ===== CARD ===== */
.item{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:transform .25s ease, box-shadow .25s ease;
  backdrop-filter: blur(14px);
}
.item:hover{transform:translateY(-6px);box-shadow:0 22px 55px rgba(0,0,0,.45)}
.item.active{border-color:rgba(56,189,248,.35);box-shadow:0 26px 65px rgba(56,189,248,.18)}

/* item-body */
.item-body{
  display:flex;
  gap:14px;
  padding:16px;
  align-items:flex-start;
}

/* Fade-in */
.item{opacity:0;transform:translateY(10px);animation:fadeUp .28s ease-out forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ===== INFO ===== */
.info{flex:1}
.badge{
  display:inline-block;padding:3px 12px;border-radius:999px;font-size:12px;margin-right:6px;
  background:rgba(96,165,250,.16);border:1px solid rgba(96,165,250,.25);color:#bfdbfe;
}
.badge.ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35);color:#bbf7d0}
.badge.warn{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.35);color:#fde68a}
.field{margin:6px 0}
.missing{color:#fecaca;font-weight:700}

/* ===== WI BAR ===== */
.wi-bar{
  display:flex;gap:10px;padding:12px;border-top:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.12);
}
.wi-bar button{
  flex:1;height:42px;border-radius:12px;border:none;font-size:14px;cursor:pointer;
  font-weight:900;
}
.wi-bar button.on{background:linear-gradient(135deg,#34d399,var(--accent));color:#fff}
.wi-bar button.on:hover{filter:brightness(1.06)}
.wi-bar button.off{background:rgba(255,255,255,.10);color:var(--muted);cursor:not-allowed}

/* ปุ่มแจ้งปัญหา */
.wi-bar button.report-btn{
  background:rgba(239,68,68,.12);
  color:#fecaca;
  border:1px solid rgba(239,68,68,.25);
  cursor:pointer;
}
.wi-bar button.report-btn:hover{filter:brightness(1.08)}

/* ===== MODAL (ภาพ) ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:none;align-items:center;justify-content:center;z-index:9999;
}
.modal img{max-width:95vw;max-height:90vh;object-fit:contain}

/* ===== LOADING OVERLAY (match STORE) ===== */
.loading-overlay{
  position:fixed;inset:0;background:rgba(2,6,23,.70);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:20000;
}
.loading-box{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  padding:26px 34px;border-radius:22px;text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.55);
  min-width:220px;
}
.loading-logo{
  width:76px;margin-bottom:12px;
  filter: drop-shadow(0 0 18px rgba(56,189,248,.35));
  animation:breath 2.2s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{opacity:.55;transform:scale(1)}
  50%{opacity:1;transform:scale(1.03)}
}
.spinner{
  width:38px;height:38px;border:4px solid rgba(255,255,255,.18);
  border-top:4px solid var(--accent2);
  border-radius:50%;margin:10px auto;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== REPORT MODAL ===== */
.report-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;z-index:40000;
}
.report-modal{
  width:380px;max-width:92vw;background:rgba(255,255,255,.92);
  border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.45);overflow:hidden;
}
.report-header{
  padding:14px 16px;font-size:18px;font-weight:900;
  background:#0b1220;color:#e5e7eb;border-bottom:1px solid rgba(0,0,0,.25);
}
.report-body{
  padding:14px 16px;display:flex;flex-direction:column;gap:10px;
}
.report-body label{font-size:13px;font-weight:800;color:#111827}
.report-body input,.report-body textarea{
  border:1px solid #e5e7eb;border-radius:10px;padding:9px 10px;font-size:14px;outline:none;
}
.report-body textarea{min-height:80px;resize:none}
.report-options{display:flex;flex-direction:column;gap:6px;font-size:14px;color:#111827}
.report-footer{
  display:flex;gap:10px;padding:12px 16px;border-top:1px solid #e5e7eb;
}
.report-footer button {
  flex: 1;
  height: 40px;
  border-radius: 10px;
  border: 1px solid rgba(0, 0, 0, .08);
  background: #ffffff;
  color: #111827;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
}
.report-footer button:hover {
  background: #f3f4f6;
}
/* ซ่อน location ใน report modal */
.hide-location{display:none !important;}

/* ===== Light mode overrides ===== */
body.light input{
  background:#ffffff;
  color:var(--text);
  border:1px solid rgba(148,163,184,.7);
}
body.light input::placeholder{
  color:var(--muted);
}
body.light .search-card{
  box-shadow:0 8px 24px rgba(15,23,42,.12);
}
body.light .item{
  box-shadow:0 8px 24px rgba(15,23,42,.12);
}
body.light .filter-bar button{
  background:rgba(15,23,42,.04);
  border-color:rgba(148,163,184,.4);
  color:var(--text);
}
body.light .filter-bar button.active{
  background:rgba(56,189,248,.18)!important;
  border-color:rgba(56,189,248,.55)!important;
  color:#0f172a;
}
body.light button.ghost{
  background:rgba(15,23,42,.04);
  border-color:rgba(148,163,184,.4);
  color:var(--text);
}
body.light .wi-bar{
  background:rgba(148,163,184,.18);
  border-top:1px solid rgba(148,163,184,.5);
}
body.light .badge{
  background:rgba(59,130,246,.12);
  border-color:rgba(37,99,235,.35);
  color:#1e293b;
}
body.light .badge.ok{
  background:rgba(34,197,94,.14);
  border-color:rgba(21,128,61,.45);
  color:#14532d;
}
body.light .badge.warn{
  background:rgba(245,158,11,.16);
  border-color:rgba(217,119,6,.5);
  color:#92400e;
}

/* ===== MOBILE ===== */
@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  .item-body{flex-direction:column}
  .wi-bar{flex-direction:column}
  .small-note{margin-left:0;width:100%}
  #btnReportMain{ flex-basis:100%; }
}


/* ===== Language switch (match STORE) ===== */
.lang-switch{
  position:fixed; top:16px; right:120px; z-index:9999;
  padding:6px 12px; border-radius:10px;
  border:1px solid var(--border);
  background:var(--glass); color:var(--text);
  cursor:pointer; font-size:12px;
  backdrop-filter:blur(8px);
  -webkit-appearance:none; appearance:none;
}
body.light .lang-switch{ background:rgba(255,255,255,.95); border-color:rgba(15,23,42,.15); }
.lang-switch option{ color:#0f172a; background:#ffffff; }

/* ===== Mobile header (STORE-like) ===== */
.mobile-topbar{display:none; position:sticky; top:0; z-index:12000;
  backdrop-filter: blur(14px);
  background:rgba(2,6,23,.65);
  border-bottom:1px solid rgba(255,255,255,.08);
}
body.light .mobile-topbar{
  background: rgba(255,255,255,0.72);
  border-bottom: 1px solid rgba(0,0,0,0.12);
  backdrop-filter: blur(18px);
}
.mobile-topbar .inner{max-width:1200px;margin:0 auto;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.mobile-topbar .back-btn{padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#fff;cursor:pointer;}
body.light .mobile-topbar .back-btn{background: rgba(255,255,255,0.55);color:#0f172a;border:1px solid rgba(0,0,0,0.15);}
.mobile-topbar .brand{margin-left:auto;text-align:right;}
.mobile-topbar .brand .h1{font-weight:900;letter-spacing:.6px;font-size:14px;}
.mobile-topbar .brand .sub{color:var(--muted);font-size:11px;margin-top:2px;}

.kebab-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--glass);color:var(--text);
  cursor:pointer;backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;font-size:18px;line-height:1;}
.kebab-btn:hover{filter:brightness(1.06)}

@media (max-width:480px){
  .toggle-theme{display:none;}
  .lang-switch{display:none;}
  .back-fixed{display:none;}
  .header{display:none;}
  .mobile-topbar{display:block;}
  .kebab-btn{display:flex;}
}

/* Settings modal */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:45000;}
.settings-modal{width:380px;max-width:92vw;background:rgba(255,255,255,.96);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.45);overflow:hidden;}
.settings-header{padding:14px 16px;font-size:18px;font-weight:900;background:#0b1220;color:#e5e7eb;border-bottom:1px solid rgba(0,0,0,.25);}
.settings-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;color:#111827;}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.settings-row .lbl{font-weight:900;font-size:13px;color:#111827;}
.settings-actions{display:flex;gap:10px;}
.settings-actions button{flex:1;height:40px;border-radius:10px;border:1px solid rgba(0,0,0,.10);cursor:pointer;font-weight:900;}
.settings-actions .dark{background:#0b1220;color:#e5e7eb;}
.settings-actions .light{background:#ffffff;color:#0f172a;}
.settings-body select{height:40px;border-radius:10px;border:1px solid #e5e7eb;padding:0 10px;font-size:14px;}
.settings-footer{padding:12px 16px;border-top:1px solid #e5e7eb;}
.settings-footer button{width:100%;height:40px;border-radius:10px;border:1px solid rgba(0,0,0,.10);cursor:pointer;font-weight:900;}

/* Report modal readability */
.report-modal{background:rgba(255,255,255,.96);}
.report-body input,.report-body textarea{background:#ffffff;color:#111827;}
.report-body input::placeholder,.report-body textarea::placeholder{color:#6b7280;}
.report-footer button{border:1px solid rgba(0,0,0,.08);}

/* FIX-2: force radio to be dot like STORE */
.report-options input[type="radio"]{
  appearance:auto !important;
  -webkit-appearance:radio !important;

  width:14px !important;
  height:14px !important;

  padding:0 !important;
  margin:0 !important;

  border-radius:50% !important;
  accent-color:#0b1220;
}

/* Buttons visibility improvements */
#btnReportMain{background:linear-gradient(135deg,#f97373,#e11d48) !important;color:#fff !important;border:none !important;}
#btnShowAll{background:linear-gradient(135deg, rgba(59,130,246,.95), rgba(37,99,235,.95));color:#fff;border:none;}

/* 4 action buttons in 2x2 grid */
.wi-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;border-top:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.12);}
.wi-bar button{width:100%;height:44px;}

/* Light mode: make WI/Sticker buttons stand out */
body.light .wi-bar button.off{background:rgba(15,23,42,.06);color:#0f172a;border:1px solid rgba(15,23,42,.12);}
body.light .wi-bar button.on{box-shadow:0 10px 24px rgba(21,128,61,.18);}
body.light .wi-bar button.report-btn{background:linear-gradient(135deg,#f97373,#e11d48);color:#fff;border:none;}

/* Warn badge stronger */
.badge.warn{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35);color:#fecaca;}
body.light .missing{color:#b91c1c;font-weight:800;}
/* FIX-1: back button visible in light mode (desktop) */
body.light .back-fixed{
  background: rgba(255,255,255,0.85);
  color:#0f172a;
  border:1px solid rgba(0,0,0,0.15);
}

/* ===== แก้ไขปุ่มวงกลม (Radio) ในหน้าแจ้งปัญหา ===== */
.report-options input[type="radio"] {
  -webkit-appearance: radio !important;
  appearance: auto !important;
  width: 16px !important;
  height: 16px !important;
  min-width: auto !important; /* ยกเลิกความกว้าง 260px ของช่องค้นหา */
  flex: none !important; /* ยกเลิก flex */
  margin: 0 8px 0 0 !important;
  padding: 0 !important;
  accent-color: #0b1220 !important; /* สีดำเวลาถูกคลิกเลือก */
  cursor: pointer;
}

/* จัดให้อยู่บรรทัดเดียวกันสวยๆ */
.report-options label {
  display: flex !important;
  align-items: center !important;
  font-weight: 500 !important;
  margin-bottom: 4px;
  cursor: pointer;
}

</style>
</head>

<body>

<body>

<button class="toggle-theme" onclick="toggleTheme()">🌙 / 🔆</button>
<select id="langSwitcher" class="lang-switch" onchange="setLang(this.value)">
  <option value="th">🇹🇭 TH</option>
  <option value="mm">🇲🇲 MM</option>
  <option value="cn">🇹🇼 繁體</option>
</select>

<div class="mobile-topbar">
  <div class="inner">
    <button class="back-btn" type="button" onclick="location.href='index.html'"><span id="t_back_mobile">⬅ กลับเมนู</span></button>
   <button id="kebabBtn" class="kebab-btn" type="button">⋯</button>
    <div class="brand">
      <div class="h1" id="t_brand_h1">KAOSU PACKING</div>
      <div class="sub" id="t_brand_sub">Smart Operation</div>
    </div>
  </div>
</div>

<button class="back-fixed" onclick="location.href='index.html'"><span id="t_back_fixed">⬅ กลับเมนู</span></button>

<div class="wrap">

  <div class="header">
    <div class="logo">
      <img src="assets/logo.png" alt="Company Logo">
    </div>
    <div>
      <div class="title" id="t_packing_title">PACKING</div>
      <div class="subtitle" id="t_packing_sub">KAOSU PACKING · Smart Operation</div>
    </div>
  </div>

  <div class="search-card">
    <div class="row">
      <input id="q" placeholder="ค้นหางาน / ลูกค้า / แพ็ค / สติ๊กเกอร์">
      <button class="primary" id="btnSearch">ค้นหา</button>
      <button class="secondary" id="btnShowAll">แสดงทั้งหมด</button>
      <button class="ghost" id="btnReportMain">🚨 แจ้งปัญหา (งานไม่อยู่ในฐาน)</button>
    </div>
  </div>

  <div class="filter-bar">
    <button id="btnAll" class="active">ทั้งหมด (<span id="sumAll">0</span>)</button>
    <button id="btnOK">✅ WI ครบ (<span id="sumOK">0</span>)</button>
    <button id="btnNG">⚠️ WI ยังไม่ครบ (<span id="sumNG">0</span>)</button>
    <button id="btnReload">🔄 Reload</button>
    <div class="small-note" id="loadedNote">กำลังโหลด...</div>
  </div>

  <div id="list" class="grid"></div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg" alt="พรีวิว">
</div>

<div id="loading" class="loading-overlay">
  <div class="loading-box">
    <img src="assets/logo.png" class="loading-logo" alt="logo">
    <div class="spinner"></div>
  </div>
</div>

<div id="reportOverlay" class="report-overlay" onclick="closeReportModal()">
  <div class="report-modal" onclick="event.stopPropagation()">
    <div class="report-header" id="t_report_header">🚨 แจ้งปัญหา</div>

    <div class="report-body">
      <label id="t_report_item_lbl">Location / งาน</label>
      <input id="reportItem" placeholder="เช่น A1-01 / Part Name">

      <div class="hide-location">
        <label id="t_report_loc_lbl">Location</label>
        <input id="reportLocation" placeholder="Location (ถ้ามี)">
      </div>

      <label id="t_report_type_lbl">ประเภทปัญหา</label>
      <div class="report-options">
        <label><input type="radio" name="reportType" value="ตำแหน่งไม่ตรง"> <span id="t_type_pos">ตำแหน่งไม่ตรง</span></label>
        <label><input type="radio" name="reportType" value="ปริ้น WI"> <span id="t_type_wi">ปริ้น WI</span></label>
        <label><input type="radio" name="reportType" value="อื่นๆ"> <span id="t_type_other">อื่นๆ</span></label>
      </div>

      <label id="t_report_more_lbl">รายละเอียดเพิ่มเติม</label>
      <textarea id="reportDetail" placeholder="รายละเอียดปัญหา"></textarea>
    </div>

    <div class="report-footer">
      <button type="button" id="btnReportCancel" onclick="closeReportModal()">ยกเลิก</button>
      <button type="button" id="btnReportSubmit" onclick="submitReport()">ส่งแจ้งปัญหา</button>
    </div>
  </div>
</div>

<div id="settingsOverlay" class="settings-overlay">
  <div class="settings-modal" onclick="event.stopPropagation()">
    <div class="settings-header" id="t_settings_title">⚙️ ตั้งค่า</div>
    <div class="settings-body">
      <div class="settings-row">
        <div class="lbl" id="t_settings_theme">🌙 ธีม:</div>
        <div class="settings-actions">
          <button class="dark" type="button" onclick="setTheme('dark')">Dark</button>
          <button class="light" type="button" onclick="setTheme('light')">Light</button>
        </div>
      </div>
      <div class="settings-row">
        <div class="lbl" id="t_settings_lang">🌐 ภาษา:</div>
        <select id="settingsLangSelect" onchange="setLang(this.value)">
          <option value="th">🇹🇭 TH</option>
          <option value="mm">🇲🇲 MM</option>
          <option value="cn">🇹🇼 繁體</option>
        </select>
      </div>
    </div>
    <div class="settings-footer">
      <button type="button" id="t_settings_close" onclick="closeSettings()">ปิด</button>
    </div>
  </div>
</div>

<script>
// ===== THEME (Global) =====
(function(){
  const t = localStorage.getItem("theme") || "dark";
  if(t === "light"){ document.body.classList.add("light"); }
})();

function toggleTheme(){
  if(document.body.classList.contains("light")){
    document.body.classList.remove("light");
    localStorage.setItem("theme","dark");
  }else{
    document.body.classList.add("light");
    localStorage.setItem("theme","light");
  }
}

// ===== I18N (ระบบแปลภาษา) =====
let I18N = null;
let LANG = localStorage.getItem("lang") || "th";
const STR = {}; 

async function loadI18N(){
  try{
    const res = await fetch('languages.json', { cache: 'no-store' });
    I18N = await res.json();
  }catch(err){
    console.warn('โหลด languages.json ไม่สำเร็จ', err);
    I18N = {};
  }
  return I18N;
}

function t(key, fallback=''){
  const pack = (I18N && I18N[LANG]) ? I18N[LANG] : null;
  return (pack && pack[key] !== undefined) ? String(pack[key]) : fallback;
}

function applyLang(code){
  LANG = code || localStorage.getItem('lang') || 'th';
  localStorage.setItem('lang', LANG);

  const sel = document.getElementById('langSwitcher');
  const sel2 = document.getElementById('settingsLangSelect');
  if(sel) sel.value = LANG;
  if(sel2) sel2.value = LANG;

  // ฟังก์ชันช่วยเซ็ตข้อความ
  const setText = (id, key, fb) => { const el = document.getElementById(id); if(el) el.textContent = t(key, fb); };

  setText('t_packing_title', 'packing_title', 'PACKING');
  setText('t_packing_sub', 'packing_sub', 'KAOSU PACKING · Smart Operation');
  setText('t_back_fixed', 'back_menu_main', '⬅ กลับเมนู');
  setText('t_back_mobile', 'back_menu_main', '⬅ กลับเมนู');
  setText('t_brand_h1', 'brand_main', 'KAOSU PACKING');
  setText('t_brand_sub', 'packing_sub', 'Smart Operation');

  const q = document.getElementById('q');
  if(q) q.placeholder = t('packing_search_ph', 'ค้นหางาน / ลูกค้า / แพ็ค / สติ๊กเกอร์');

  setText('btnSearch', 'packing_search', 'ค้นหา');
  setText('btnShowAll', 'packing_show_all', 'แสดงทั้งหมด');
  setText('btnReportMain', 'packing_report_main', '🚨 แจ้งปัญหา (งานไม่อยู่ในฐาน)');

  // อัปเดตปุ่ม Filter (คงตัวเลขเอาไว้)
  const sumAll = document.getElementById('sumAll')?.textContent || '0';
  const sumOK = document.getElementById('sumOK')?.textContent || '0';
  const sumNG = document.getElementById('sumNG')?.textContent || '0';
  
  const btnAllEl = document.getElementById('btnAll');
  if(btnAllEl) btnAllEl.innerHTML = `${t('packing_all', 'ทั้งหมด')} (<span id="sumAll">${sumAll}</span>)`;
  const btnOKEl = document.getElementById('btnOK');
  if(btnOKEl) btnOKEl.innerHTML = `${t('packing_filter_ok', '✅ WI ครบ')} (<span id="sumOK">${sumOK}</span>)`;
  const btnNGEl = document.getElementById('btnNG');
  if(btnNGEl) btnNGEl.innerHTML = `${t('packing_filter_ng', '⚠️ WI ยังไม่ครบ')} (<span id="sumNG">${sumNG}</span>)`;
  setText('btnReload', 'packing_reload', '🔄 Reload');

  // ดึงข้อความมาเก็บไว้ในตัวแปรสำหรับใช้วาดการ์ด (Card)
  STR.customer = t('packing_customer', 'ลูกค้า:');
  STR.job = t('packing_job', 'งาน:');
  STR.pack = t('packing_pack', 'แพ็ค:');
  STR.sticker = t('packing_sticker', 'สติ๊กเกอร์:');
  STR.missing = t('packing_missing', 'ยังไม่ได้ใส่');
  STR.wiFront = t('packing_btn_wi_front', 'WI หน้า');
  STR.wiBack = t('packing_btn_wi_back', 'WI หลัง');
  STR.btnSticker = t('packing_btn_sticker', 'สติ๊กเกอร์');
  STR.reportBtn = t('packing_report', '🚨 แจ้งปัญหา');
  STR.badgeOK = t('packing_badge_ok', 'ข้อมูลพร้อม');
  STR.badgeNG = t('packing_badge_ng', 'ยังไม่ครบ WI');

  // Modal Report
  setText('t_report_header', 'packing_report', '🚨 แจ้งปัญหา');
  setText('t_report_item_lbl', 'packing_report_item', 'Location / งาน');
  setText('t_report_loc_lbl', 'packing_report_location', 'Location');
  setText('t_report_type_lbl', 'packing_report_type', 'ประเภทปัญหา');
  setText('t_report_more_lbl', 'packing_report_more', 'รายละเอียดเพิ่มเติม');
  setText('t_type_pos', 'packing_report_type_pos', 'ตำแหน่งไม่ตรง');
  setText('t_type_wi', 'packing_report_type_wi', 'ปริ้น WI');
  setText('t_type_other', 'packing_report_type_other', 'อื่นๆ');
  setText('btnReportCancel', 'packing_cancel', 'ยกเลิก');
  setText('btnReportSubmit', 'packing_submit', 'ส่งแจ้งปัญหา');
  
  const ri = document.getElementById('reportItem');
  if(ri) ri.placeholder = t('packing_report_item_ph', '');
  const rd = document.getElementById('reportDetail');
  if(rd) rd.placeholder = t('packing_report_more', '');

  // Modal Settings
  setText('t_settings_title', 'settings_title', '⚙️ ตั้งค่า');
  setText('t_settings_theme', 'settings_theme', '🌙 ธีม:');
  setText('t_settings_lang', 'settings_language', '🌐 ภาษา:');
  setText('t_settings_close', 'settings_close', 'ปิด');
}

function setLang(code){
  applyLang(code);
  applyFilter(); // รีเฟรชข้อมูลในการ์ดให้เป็นภาษาใหม่
}

// ===== SETTINGS (mobile ⋯) =====
function openSettings(){
  const el = document.getElementById('settingsOverlay');
  if(el) el.style.display='flex';
}
function closeSettings(){
  const el = document.getElementById('settingsOverlay');
  if(el) el.style.display='none';
}
function setTheme(mode){
  if(mode==='light'){
    document.body.classList.add('light');
    localStorage.setItem('theme','light');
  }else{
    document.body.classList.remove('light');
    localStorage.setItem('theme','dark');
  }
}

// ===== CONFIG =====
const API_BASE = "https://script.google.com/macros/s/AKfycbzkNIh_rL3qExRSBJingYUCJXVJA_o1D7xVA3QymOL0ADaTlHvu1wRTYexv_cJrieTICg/exec";
const LIMIT = 200;

// ===== ELEMENTS =====
const list = document.getElementById("list");
const loadedNote = document.getElementById("loadedNote");
const loading = document.getElementById("loading");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

const sumAll = document.getElementById("sumAll");
const sumOK = document.getElementById("sumOK");
const sumNG = document.getElementById("sumNG");

const qEl = document.getElementById("q");
const btnSearch = document.getElementById("btnSearch");
const btnShowAll = document.getElementById("btnShowAll");
const btnReload = document.getElementById("btnReload");
const btnAll = document.getElementById("btnAll");
const btnOK = document.getElementById("btnOK");
const btnNG = document.getElementById("btnNG");
const btnReportMain = document.getElementById("btnReportMain");

const reportOverlay = document.getElementById("reportOverlay");
const reportItem = document.getElementById("reportItem");
const reportLocation = document.getElementById("reportLocation");
const reportDetail = document.getElementById("reportDetail");

// ===== STATE =====
let ALL_ITEMS = [];
let VIEW_ITEMS = [];
let FILTER_MODE = "all";
let offset = 0;
let finished = false;
let fetching = false;

const okVal = v => {
  const t = String(v ?? "").trim();
  return t !== "" && t !== "#N/A";
};
const hasWI = it => okVal(it.wi_front_url) || okVal(it.wi_back_url) || okVal(it.label_image_url);

// JSONP
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s  = document.createElement("script");

    const timer = setTimeout(()=>{
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 15000);

    function cleanup(){
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) {}
      try { s.remove(); } catch(e) {}
    }

    window[cb] = (d) => { cleanup(); resolve(d); };
    s.onerror = () => { cleanup(); reject(new Error("JSONP failed")); };

    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    document.body.appendChild(s);
  });
}

function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function openModal(src){
  modalImg.src = String(src || "");
  modal.style.display = "flex";
}

// ===== REPORT MODAL LOGIC =====
let CURRENT_REPORT = null;

function openReportModal(itemEncoded){
  const it = JSON.parse(decodeURIComponent(itemEncoded));
  CURRENT_REPORT = it;

  reportItem.value = it.part_name || "";
  reportLocation.value = ""; 
  document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
  reportDetail.value = "";
  reportOverlay.style.display = "flex";
}

function openReportModalManual(){
  CURRENT_REPORT = null;
  reportItem.value = qEl.value.trim() || "";
  reportLocation.value = "";
  document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
  reportDetail.value = "";
  reportOverlay.style.display = "flex";
}

function closeReportModal(){
  reportOverlay.style.display = "none";
  CURRENT_REPORT = null;
}

async function submitReport(){
  const type = document.querySelector('input[name="reportType"]:checked')?.value || "";
  const item = reportItem.value || (CURRENT_REPORT?.part_name || "");
  const location = reportLocation.value || "";
  const detail = reportDetail.value || "";

  if(!type && !detail){
    alert(t('packing_err_select', "กรุณาเลือกประเภทปัญหาหรือใส่รายละเอียดอย่างน้อย 1 อย่าง"));
    return;
  }

  const page = "Packing";
  const url =
    API_BASE +
    "?action=report" +
    "&item=" + encodeURIComponent(item) +
    "&location=" + encodeURIComponent(location) +
    "&type=" + encodeURIComponent(type) +
    "&detail=" + encodeURIComponent(detail) +
    "&page=" + encodeURIComponent(page);

  try{
    showLoading();
    const res = await jsonp(url);
    hideLoading();
    closeReportModal();

    if(res && res.ok === true && res.saved === true){
      alert(t('packing_send_success', "ส่งแจ้งปัญหาเรียบร้อย ✅") + (res.lineSent ? "\n" + t('packing_line_sent', "LINE ส่งแล้ว ✅") : "\n" + t('packing_line_not_sent', "LINE ยังไม่ส่ง ⚠️")));
    }else{
      alert(t('packing_send_fail', "ส่งไม่สำเร็จ ❌") + "\n" + JSON.stringify(res));
    }
  }catch(err){
    hideLoading();
    alert(t('packing_backend_fail', "เรียกหลังบ้านไม่สำเร็จ ❌") + "\n" + err.message);
  }
}

// ===== UI RENDER =====
function card(it){
  return `
  <div class="item" onclick="setActive(this)">
    <div class="item-body">
      <div class="info">
        <div class="field">
          <span class="badge ${hasWI(it)?'ok':'warn'}">
            ${hasWI(it) ? STR.badgeOK : STR.badgeNG}
          </span>
        </div>

        <div class="field">${STR.customer} <b>${it.customer_code || ""}</b></div>
        <div class="field">${STR.job} <b>${it.part_name || ""}</b></div>

        <div class="field">${STR.pack} ${okVal(it.packing_type)?it.packing_type:`<span class="missing">${STR.missing}</span>`}</div>
        <div class="field">${STR.sticker} ${okVal(it.label_color)?it.label_color:`<span class="missing">${STR.missing}</span>`}</div>
      </div>
    </div>

    <div class="wi-bar" onclick="event.stopPropagation()">
      <button class="${okVal(it.wi_front_url)?'on':'off'}" ${okVal(it.wi_front_url)?`onclick="openModal('${it.wi_front_url}')"`:"disabled"}>${STR.wiFront}</button>
      <button class="${okVal(it.wi_back_url)?'on':'off'}" ${okVal(it.wi_back_url)?`onclick="openModal('${it.wi_back_url}')"`:"disabled"}>${STR.wiBack}</button>
      <button class="${okVal(it.label_image_url)?'on':'off'}" ${okVal(it.label_image_url)?`onclick="openModal('${it.label_image_url}')"`:"disabled"}>${STR.btnSticker}</button>

      <button class="report-btn" onclick="event.stopPropagation(); openReportModal('${encodeURIComponent(JSON.stringify(it))}')">
        ${STR.reportBtn}
      </button>
    </div>
  </div>`;
}

function setActive(el){
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

function updateCounts(){
  document.getElementById("sumAll").textContent = ALL_ITEMS.length;
  document.getElementById("sumOK").textContent = ALL_ITEMS.filter(hasWI).length;
  document.getElementById("sumNG").textContent = ALL_ITEMS.filter(i=>!hasWI(i)).length;
}

function applyFilter(){
  btnAll.classList.remove("active");
  btnOK.classList.remove("active");
  btnNG.classList.remove("active");

  let items = ALL_ITEMS;

  if(FILTER_MODE==="ok"){
    items = ALL_ITEMS.filter(hasWI);
    btnOK.classList.add("active");
  }else if(FILTER_MODE==="ng"){
    items = ALL_ITEMS.filter(i=>!hasWI(i));
    btnNG.classList.add("active");
  }else{
    btnAll.classList.add("active");
  }

  VIEW_ITEMS = items;
  list.innerHTML = "";
  VIEW_ITEMS.forEach(it=>list.insertAdjacentHTML("beforeend", card(it)));
  loadedNote.textContent = `${t('store_show_all', 'แสดงทั้งหมด')} ${VIEW_ITEMS.length} ${t('store_items', 'รายการ')}`;
}

async function loadAllPages(){
  if(fetching) return;
  fetching = true;

  offset = 0;
  finished = false;
  ALL_ITEMS = [];
  list.innerHTML = "";
  loadedNote.textContent = t('packing_loading', "กำลังโหลด...");
  updateCounts();
  applyFilter();
  showLoading();

  try{
    while(!finished){
      const r = await jsonp(API_BASE + `?action=list&limit=${LIMIT}&offset=${offset}`);
      const items = r.items || r.results || [];
      ALL_ITEMS = ALL_ITEMS.concat(items);
      offset += items.length;

      if(items.length < LIMIT) finished = true;
      await new Promise(res=>setTimeout(res, 60));
    }

    updateCounts();
    applyFilter();
  }finally{
    hideLoading();
    fetching = false;
  }
}

async function doSearch(){
  const q = qEl.value.trim();
  if(!q) return loadAllPages();

  showLoading();
  try{
    const r = await jsonp(API_BASE + "?action=search&q=" + encodeURIComponent(q));
    ALL_ITEMS = r.results || r.items || [];

    FILTER_MODE = "all";
    updateCounts();
    applyFilter();

    if(ALL_ITEMS.length === 0){
      loadedNote.textContent = t('packing_no_data_click', "ไม่พบข้อมูล — กด 🚨 แจ้งปัญหา");
    }
  }finally{
    hideLoading();
  }
}

function showAll(){
  qEl.value = "";
  FILTER_MODE="all";
  return loadAllPages();
}

function reloadData(){ return loadAllPages(); }

// EVENTS
btnSearch.onclick = doSearch;
btnShowAll.onclick = showAll;
btnReload.onclick = reloadData;

btnAll.onclick = ()=>{ FILTER_MODE="all"; applyFilter(); };
btnOK.onclick = ()=>{ FILTER_MODE="ok"; applyFilter(); };
btnNG.onclick = ()=>{ FILTER_MODE="ng"; applyFilter(); };

btnReportMain.onclick = openReportModalManual;

qEl.addEventListener("keydown",(e)=>{ if(e.key==="Enter") doSearch(); });

document.getElementById('settingsOverlay')?.addEventListener('click', (e) => {
  if (e.target.id === 'settingsOverlay') closeSettings();
});
document.getElementById('kebabBtn')?.addEventListener('click', openSettings);

// START (โหลดไฟล์ JSON ก่อน แล้วค่อยดึงข้อมูลจาก Sheet)
loadI18N().then(() => {
  applyLang(LANG);
  loadAllPages();
});
</script>
