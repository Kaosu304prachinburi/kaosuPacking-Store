<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PACKING | KAOSU PACKING</title>

<style>
:root{
      --bg1:#020617;
      --bg2:#0f172a;
      --glass:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.18);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#22c55e;
      --accent2:#38bdf8;
      /* เงาวงด้านบน ใช้เฉพาะโหมดมืด */
      --header-shadow: radial-gradient(900px 500px at top, #1e293b 0%, transparent 60%);
    }

    /* Light mode */
    body.light{
      --bg1:#f5f7fa;
      --bg2:#e2e8f0;
      --glass:rgba(255,255,255,.96);
      --border:rgba(15,23,42,.10);
      --text:#0f172a;
      --muted:#64748b;
      --header-shadow:none;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Arial;
      color:var(--text);
      background:
        var(--header-shadow),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      transition:background .25s ease,color .25s ease;
    }

    /* ปุ่มสลับธีม */
    .toggle-theme{
      position:fixed;
      top:16px;
      right:16px;
      z-index:2000;
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      backdrop-filter:blur(10px);
      font-size:13px;
    }

    /* ปุ่มเลือกภาษา ข้างๆ ปุ่มธีม */
    .lang-switch{
      position:fixed;
      top:16px;
      right:120px;
      z-index:2000;
      padding:6px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      font-size:12px;
      backdrop-filter:blur(8px);
    }

    body.light .lang-switch{
      background:rgba(255,255,255,.95);
      border-color:rgba(15,23,42,.15);
    }

    /* ===== TOP BAR ===== */
    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      backdrop-filter: blur(14px);
      background:rgba(2,6,23,.65);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    body.light .topbar{
      background: rgba(255,255,255,0.72);
      border-bottom: 1px solid rgba(0,0,0,0.12);
      backdrop-filter: blur(18px);
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:14px 16px 12px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    /* Back */
    .back-btn{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.10);
      color:#fff;
      cursor:pointer;
    }
    .back-btn:hover{ filter:brightness(1.06); }

    body.light .back-btn{
      background: rgba(255,255,255,0.55);
      color: #0f172a;
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* Brand */
    .brand{
      margin-left:auto;
      text-align:right;
    }
    .brand .h1{
      font-weight:900;
      letter-spacing:.6px;
      font-size:14px;
    }
    .brand .sub{
      color:var(--muted);
      font-size:11px;
      margin-top:2px;
    }

    /* ===== SEARCH AREA ===== */
    .search-area{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    /* Search row: input + button */
    .search-row{
      display:grid;
      grid-template-columns: 1fr 160px;
      gap:12px;
      align-items:stretch;
    }

    .search-row input{
      width:100%;
      height:56px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      padding:0 18px;
      font-size:16px;
      -webkit-appearance:none;
      appearance:none;
      outline:none;
    }
    .search-row input::placeholder{ color:var(--muted); }

    /* Buttons */
    .btn{
      height:56px;
      min-height:56px;
      padding:0 18px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      width:100%;
      display:block;
      text-align:center;
      line-height:56px;
      font-weight:900;
      font-size:16px;
      letter-spacing:.3px;
      white-space:nowrap;
      color:#fff;
      box-shadow:0 14px 36px rgba(0,0,0,.35);
      transition:transform .15s ease, filter .15s ease;
    }
    .btn:hover{ filter:brightness(1.06); }
    .btn:active{ transform:scale(.98); }
    .btn.search{ background:linear-gradient(135deg,#34d399,var(--accent)); }
    .btn.issue-main{ background:linear-gradient(135deg,#f97373,#e11d48); }

    body.light .search-row input{
      background:#ffffff;
      color:var(--text);
      border-color:rgba(148,163,184,.7);
    }

    /* Status */
    .status{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    body.light .status{ color:#1e293b; }

    /* Mobile toggle (arrow) */
    .mobile-toggle{
      display:none;
      width:100%;
      margin-top:10px;
      height:38px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--glass);
      color:var(--text);
      cursor:pointer;
      font-weight:900;
      letter-spacing:.3px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }
    .mobile-toggle:hover{ filter:brightness(1.06); }

    /* Desktop fine-tune */
    @media (min-width: 900px){
      .search-row{ grid-template-columns: 1fr 170px; }
      .btn{ font-size:15px; }
    }

    /* Mobile */
    @media (max-width: 480px){
      .search-row{ grid-template-columns: 1fr 96px; }
      .search-row input{ font-size:17px; height:58px; }
      .btn{ font-size:17px; height:58px; min-height:58px; line-height:58px; }
      .mobile-toggle{ display:block; }

      /* collapse behaviour */
      body.mobile-collapsed #searchArea{ display:none; }
    }

    /* ===== GRID ===== */
    .grid{
      max-width:1200px;
      margin:0 auto;
      padding:16px 16px 34px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap:16px;
    }

    /* ===== CARD ===== */
    .card{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 20px 55px rgba(0,0,0,.45);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 26px 70px rgba(0,0,0,.55);
    }
    body.light .card{ box-shadow:0 12px 30px rgba(15,23,42,.12); }

    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .loc{
      font-size:18px;
      font-weight:900;
      letter-spacing:.5px;
      color:var(--accent);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#fff;
    }
    .badge.ok{ color:#bbf7d0; border-color:rgba(34,197,94,.35); }
    .badge.ng{ color:#fecaca; border-color:rgba(239,68,68,.35); }

    body.light .badge{
      background:rgba(59,130,246,.12);
      border-color:rgba(37,99,235,.3);
      color:#1e293b;
    }
    body.light .badge.ok{
      background:rgba(34,197,94,.12);
      border-color:rgba(22,163,74,.4);
      color:#14532d;
    }
    body.light .badge.ng{
      background:rgba(248,113,113,.12);
      border-color:rgba(220,38,38,.4);
      color:#7f1d1d;
    }

    .field{
      margin:6px 0;
      font-size:14px;
      color:#dbeafe;
    }
    .field span.label{
      color:var(--muted);
      margin-right:6px;
    }

    /* ทำให้ช่อง “ลูกค้า:” และ “งาน:” ชัดขึ้นใน Light Mode */
    body.light .field{ color:#0f172a; }
    body.light .field span.label{ color:#334155; }

    /* Layout image */
    .thumb{
      margin-top:12px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.15);
    }
    .thumb img{
      width:100%;
      height:190px;
      object-fit:cover;
      display:block;
      cursor:pointer;
    }

    /* Card actions */
    .card-actions{
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
    }
    .card-actions .report-btn{
      height:38px;
      padding:0 16px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      background:linear-gradient(135deg,#f97373,#e11d48);
      color:#fff;
      box-shadow:0 12px 30px rgba(0,0,0,.45);
    }
    .card-actions .report-btn:hover{ filter:brightness(1.06); }

    /* Highlight */
    mark{
      background:rgba(56,189,248,.25);
      color:#e0f2fe;
      padding:0 3px;
      border-radius:6px;
    }

    /* Modal */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.78);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .modal img{
      max-width:96vw;
      max-height:92vh;
      object-fit:contain;
      border-radius:14px;
      box-shadow:0 24px 70px rgba(0,0,0,.6);
    }
    .modal .close{
      position:fixed;
      top:18px;
      right:18px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
    }
    body.light .modal .close{
      background:rgba(15,23,42,.8);
      border-color:rgba(15,23,42,.7);
    }

    /* Loading overlay */
    .loading{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.70);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9000;
    }
    .loading .box{ text-align:center; }
    .loading .logo{
      width:92px;
      filter: drop-shadow(0 0 18px rgba(56,189,248,.35));
      animation:breath 2.2s ease-in-out infinite;
    }
    @keyframes breath{
      0%,100%{ opacity:.55; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.03); }
    }
    .loading .txt{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
    }

    /* REPORT MODAL */
    .report-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:40000;
    }
    .report-modal{
      width:380px;
      max-width:92vw;
      background:rgba(255,255,255,.96);
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .report-header{
      padding:14px 16px;
      font-size:18px;
      font-weight:900;
      background:#0b1220;
      color:#e5e7eb;
      border-bottom:1px solid rgba(0,0,0,.25);
    }
    .report-body{
      padding:14px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .report-body label{ font-size:13px; font-weight:800; color:#111827; }
    .report-body input,.report-body textarea{
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:9px 10px;
      font-size:14px;
      outline:none;
    }
    .report-body textarea{ min-height:80px; resize:none; }
    .report-options{ display:flex; flex-direction:column; gap:6px; font-size:14px; color:#111827; }
    .report-footer{
      display:flex;
      gap:10px;
      padding:12px 16px;
      border-top:1px solid #e5e7eb;
    }
    .report-footer button{ flex:1; height:40px; border-radius:10px; border:1px solid rgba(0,0,0,.08); cursor:pointer; }
    .hide-location{ display:none!important; }
    body.light .report-modal{ background:#ffffff; }

/* ===== PACKING extras ===== */
/* Hide the desktop theme/lang buttons on small screens, show kebab */
.kebab-btn{
  position:fixed;
  top:16px;
  right:16px;
  z-index:2500;
  width:40px;
  height:40px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--glass);
  color:var(--text);
  cursor:pointer;
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
  font-size:18px;
  line-height:1;
}
@media (max-width:480px){
  .toggle-theme{display:none;}
  .lang-switch{display:none;}
  .kebab-btn{display:flex;}
}

/* Settings modal */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:40000;}
.settings-modal{width:380px;max-width:92vw;background:rgba(255,255,255,.96);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.45);overflow:hidden;}
.settings-header{padding:14px 16px;font-size:18px;font-weight:900;background:#0b1220;color:#e5e7eb;border-bottom:1px solid rgba(0,0,0,.25);}
.settings-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;color:#111827;}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.settings-row .lbl{font-weight:900;font-size:13px;color:#111827;}
.settings-actions{display:flex;gap:10px;}
.settings-actions button{flex:1;height:40px;border-radius:10px;border:1px solid rgba(0,0,0,.10);cursor:pointer;font-weight:900;}
.settings-actions .dark{background:#0b1220;color:#e5e7eb;}
.settings-actions .light{background:#ffffff;color:#0f172a;}
.settings-body select{height:40px;border-radius:10px;border:1px solid #e5e7eb;padding:0 10px;font-size:14px;}
.settings-footer{padding:12px 16px;border-top:1px solid #e5e7eb;}
.settings-footer button{width:100%;height:40px;border-radius:10px;border:1px solid rgba(0,0,0,.10);cursor:pointer;font-weight:900;}

/* PACKING list cards: reuse store .card look but keep .item for JS */
.item{background:var(--glass);border:1px solid var(--border);border-radius:22px;overflow:hidden;box-shadow:0 20px 55px rgba(0,0,0,.45);transition:transform .2s ease, box-shadow .2s ease;}
.item:hover{transform:translateY(-4px);box-shadow:0 26px 70px rgba(0,0,0,.55);}
body.light .item{box-shadow:0 12px 30px rgba(15,23,42,.12);}
.item-body{display:flex;gap:14px;padding:16px;align-items:flex-start;}

/* Move 4 buttons into a side panel, 2x2 grid on desktop */
.action-panel{width:220px;min-width:220px;border:2px solid rgba(239,68,68,.35);border-radius:18px;padding:12px;background:rgba(239,68,68,.06);display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
.action-panel button{height:44px;border-radius:14px;border:none;font-size:14px;cursor:pointer;font-weight:900;}
.action-panel button.on{background:linear-gradient(135deg,#34d399,var(--accent));color:#fff}
.action-panel button.off{background:rgba(255,255,255,.10);color:var(--muted);cursor:not-allowed}
.action-panel button.report-btn{background:linear-gradient(135deg,#f97373,#e11d48);color:#fff;box-shadow:0 12px 30px rgba(0,0,0,.25)}
.action-panel button.report-btn:hover{filter:brightness(1.06)}

@media (max-width:640px){
  .item-body{flex-direction:column;}
  .action-panel{width:100%;min-width:unset;}
}

/* Stronger warn badge like STORE */
.badge.warn{color:#fecaca;border-color:rgba(239,68,68,.35);}
body.light .badge.warn{background:rgba(248,113,113,.12);border-color:rgba(220,38,38,.4);color:#7f1d1d;}

/* Missing text visibility */
.missing{color:#fecaca;font-weight:800}
body.light .missing{color:#b91c1c;font-weight:800}

/* Report modal: make radio look like small round dot */
.report-options input[type="radio"]{width:14px;height:14px;accent-color:#0b1220;}

/* Report inputs readable in dark mode too */
.report-body input,.report-body textarea{background:#ffffff;color:#111827;}
.report-body input::placeholder,.report-body textarea::placeholder{color:#6b7280;}

</style>
</head>

<body>
  <button class="toggle-theme" onclick="toggleTheme()">🌙 / 🔆</button>
  <select id="langSwitcher" class="lang-switch" onchange="setLang(this.value)">
    <option value="th">🇹🇭 TH</option>
    <option value="mm">🇲🇲 MM</option>
    <option value="cn">🇹🇼 繁體</option>
  </select>
  <button id="kebabBtn" class="kebab-btn" type="button" onclick="openSettings()">⋯</button>

  <div class="topbar">
    <div class="wrap">
      <div class="row">
        <button class="back-btn" onclick="location.href='index.html'">⬅ กลับเมนู</button>
        <div class="brand">
          <div class="h1">KAOSU PACKING</div>
          <div class="sub">KAOSU PACKING · Smart Operation</div>
        </div>
      </div>

      <div id="searchArea" class="search-area">
        <div class="search-row">
          <input id="q" type="search" placeholder="ค้นหางาน / ลูกค้า / แพ็ค / สติ๊กเกอร์">
          <button class="btn search" id="btnSearch">ค้นหา</button>
        </div>

        <div class="row" style="gap:12px">
          <button class="btn ghost" id="btnShowAll">แสดงทั้งหมด</button>
          <button class="btn issue-main" id="btnReportMain">🚨 แจ้งปัญหา (งานไม่อยู่ในฐาน)</button>
        </div>

        <div class="status">
          <div id="note">พร้อมใช้งาน</div>
          <div>ผลลัพธ์: <b id="count">0</b> รายการ</div>
        </div>

        <div class="filter-bar">
          <button id="btnAll" class="active">ทั้งหมด (<span id="sumAll">0</span>)</button>
          <button id="btnOK">✅ WI ครบ (<span id="sumOK">0</span>)</button>
          <button id="btnNG">⚠️ WI ยังไม่ครบ (<span id="sumNG">0</span>)</button>
          <button id="btnReload">🔄 Reload</button>
          <div class="small-note" id="loadedNote">กำลังโหลด...</div>
        </div>
      </div>

      <button id="toggleSearchMobile" class="mobile-toggle" type="button" aria-expanded="true">⌃</button>
    </div>
  </div>

  <div id="list" class="grid"></div>

  <!-- SETTINGS MODAL (mobile 3-dots) -->
  <div id="settingsOverlay" class="settings-overlay" onclick="closeSettings()">
    <div class="settings-modal" onclick="event.stopPropagation()">
      <div class="settings-header" id="settingsTitle">⚙️ ตั้งค่า</div>
      <div class="settings-body">
        <div class="settings-row">
          <div class="lbl" id="settingsThemeLbl">🌙 ธีม:</div>
          <div class="settings-actions">
            <button class="dark" type="button" onclick="setTheme('dark')" id="btnThemeDark">มืด</button>
            <button class="light" type="button" onclick="setTheme('light')" id="btnThemeLight">สว่าง</button>
          </div>
        </div>
        <div class="settings-row">
          <div class="lbl" id="settingsLangLbl">🌐 ภาษา:</div>
          <select id="settingsLangSelect" onchange="setLang(this.value)">
            <option value="th">🇹🇭 TH</option>
            <option value="mm">🇲🇲 MM</option>
            <option value="cn">🇹🇼 繁體</option>
          </select>
        </div>
      </div>
      <div class="settings-footer">
        <button type="button" onclick="closeSettings()" id="btnSettingsClose">ปิด</button>
      </div>
    </div>
  </div>
<!-- MODAL ภาพ -->
<div id="modal" class="modal" onclick="this.style.display='none'">
  <img id="modalImg" alt="พรีวิว">
</div>

<!-- LOADING -->
<div id="loading" class="loading-overlay">
  <div class="loading-box">
    <img src="assets/logo.png" class="loading-logo" alt="logo">
    <div class="spinner"></div>
  </div>
</div>

<!-- REPORT ISSUE MODAL -->
<div id="reportOverlay" class="report-overlay" onclick="closeReportModal()">
  <div class="report-modal" onclick="event.stopPropagation()">
    <div class="report-header">🚨 แจ้งปัญหา</div>

    <div class="report-body">
      <label>ชื่องาน / ITEM</label>
      <input id="reportItem" placeholder="ชื่อ ITEM (ไม่บังคับ)">

      <div class="hide-location">
        <label>Location</label>
        <input id="reportLocation" placeholder="Location (ไม่บังคับ)">
      </div>

      <label>รายละเอียดปัญหา</label>
      <div class="report-options">
        <label><input type="radio" name="reportType" value="ตำแหน่งไม่ตรง"> ตำแหน่งไม่ตรง</label>
        <label><input type="radio" name="reportType" value="ปริ้น WI"> ปริ้น WI</label>
        <label><input type="radio" name="reportType" value="อื่นๆ"> อื่นๆ</label>
      </div>

      <textarea id="reportDetail" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
    </div>

    <div class="report-footer">
      <button class="secondary" onclick="closeReportModal()">ยกเลิก</button>
      <button class="primary" onclick="submitReport()">ส่งแจ้งปัญหา</button>
    </div>
  </div>
</div>

<script>
// ===== THEME (Global) =====
(function(){
  const t = localStorage.getItem("theme") || "dark";
  if(t === "light"){
    document.body.classList.add("light");
  }
})();

function toggleTheme(){
  if(document.body.classList.contains("light")){
    document.body.classList.remove("light");
    localStorage.setItem("theme","dark");
  }else{
    document.body.classList.add("light");
    localStorage.setItem("theme","light");
  }


// ===== LANGUAGE (match STORE) =====
function applyLangFromStorage(){
  const lang = localStorage.getItem('lang') || 'th';
  const sel = document.getElementById('langSwitcher');
  if(sel) sel.value = lang;
  const sel2 = document.getElementById('settingsLangSelect');
  if(sel2) sel2.value = lang;
}
function setLang(code){
  localStorage.setItem('lang', code);
  applyLangFromStorage();
}

// ===== SETTINGS (3 dots on mobile) =====
function openSettings(){
  applyLangFromStorage();
  const el = document.getElementById('settingsOverlay');
  if(el) el.style.display = 'flex';
}
function closeSettings(){
  const el = document.getElementById('settingsOverlay');
  if(el) el.style.display = 'none';
}
function setTheme(mode){
  if(mode==='light'){
    document.body.classList.add('light');
    localStorage.setItem('theme','light');
  }else{
    document.body.classList.remove('light');
    localStorage.setItem('theme','dark');
  }
}
}

// ===== CONFIG =====
const API_BASE = "https://script.google.com/macros/s/AKfycbwi367iEscZhY4E_o9TI8FeIRsTBVkN5yjedzMkmjOyH_xEgQp-2Lgw8bP13mDapBao9w/exec";
const LIMIT = 200;

// ===== ELEMENTS =====
const list = document.getElementById("list");
const loadedNote = document.getElementById("loadedNote");
const loading = document.getElementById("loading");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

const sumAll = document.getElementById("sumAll");
const sumOK = document.getElementById("sumOK");
const sumNG = document.getElementById("sumNG");

const qEl = document.getElementById("q");
const btnSearch = document.getElementById("btnSearch");
const btnShowAll = document.getElementById("btnShowAll");
const btnReload = document.getElementById("btnReload");
const btnAll = document.getElementById("btnAll");
const btnOK = document.getElementById("btnOK");
const btnNG = document.getElementById("btnNG");
const btnReportMain = document.getElementById("btnReportMain");

const reportOverlay = document.getElementById("reportOverlay");
const reportItem = document.getElementById("reportItem");
const reportLocation = document.getElementById("reportLocation");
const reportDetail = document.getElementById("reportDetail");

// ===== STATE =====
let ALL_ITEMS = [];
let VIEW_ITEMS = [];
let FILTER_MODE = "all";
let offset = 0;
let finished = false;
let fetching = false;

const okVal = v => {
  const t = String(v ?? "").trim();
  return t !== "" && t !== "#N/A";
};
const hasWI = it => okVal(it.wi_front_url) || okVal(it.wi_back_url) || okVal(it.label_image_url);

// JSONP
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s  = document.createElement("script");

    const timer = setTimeout(()=>{
      cleanup();
      reject(new Error("JSONP timeout"));
    }, 15000);

    function cleanup(){
      clearTimeout(timer);
      try { delete window[cb]; } catch(e) {}
      try { s.remove(); } catch(e) {}
    }

    window[cb] = (d) => { cleanup(); resolve(d); };
    s.onerror = () => { cleanup(); reject(new Error("JSONP failed")); };

    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    document.body.appendChild(s);
  });
}

function showLoading(){ loading.style.display="flex"; }
function hideLoading(){ loading.style.display="none"; }

function openModal(src){
  modalImg.src = String(src || "");
  modal.style.display = "flex";
}

// ===== REPORT MODAL LOGIC =====
let CURRENT_REPORT = null;

function openReportModal(itemEncoded){
  const it = JSON.parse(decodeURIComponent(itemEncoded));
  CURRENT_REPORT = it;

  reportItem.value = it.part_name || "";
  reportLocation.value = ""; // ไม่ใช้ location ใน PACKING
  document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
  reportDetail.value = "";
  reportOverlay.style.display = "flex";
}

function openReportModalManual(){
  CURRENT_REPORT = null;
  reportItem.value = qEl.value.trim() || "";
  reportLocation.value = "";
  document.querySelectorAll('input[name="reportType"]').forEach(r=>r.checked=false);
  reportDetail.value = "";
  reportOverlay.style.display = "flex";
}

function closeReportModal(){
  reportOverlay.style.display = "none";
  CURRENT_REPORT = null;
}

async function submitReport(){
  const type = document.querySelector('input[name="reportType"]:checked')?.value || "";
  const item = reportItem.value || (CURRENT_REPORT?.part_name || "");
  const location = reportLocation.value || ""; // ส่งว่าง
  const detail = reportDetail.value || "";

  if(!type && !detail){
    alert("กรุณาเลือกประเภทปัญหาหรือใส่รายละเอียดอย่างน้อย 1 อย่าง");
    return;
  }

  const page = "Packing";
  const url =
    API_BASE +
    "?action=report" +
    "&item=" + encodeURIComponent(item) +
    "&location=" + encodeURIComponent(location) +
    "&type=" + encodeURIComponent(type) +
    "&detail=" + encodeURIComponent(detail) +
    "&page=" + encodeURIComponent(page);

  try{
    showLoading();
    const res = await jsonp(url);
    hideLoading();
    closeReportModal();

    if(res && res.ok === true && res.saved === true){
      alert("ส่งแจ้งปัญหาเรียบร้อย ✅" + (res.lineSent ? "\nLINE ส่งแล้ว ✅" : "\nLINE ยังไม่ส่ง ⚠️"));
    }else{
      alert("ส่งไม่สำเร็จ ❌\n" + JSON.stringify(res));
    }
  }catch(err){
    hideLoading();
    alert("เรียกหลังบ้านไม่สำเร็จ ❌\n" + err.message);
  }
}

// ===== UI RENDER =====
function card(it){
  return `
  <div class="item" onclick="setActive(this)">
    <div class="item-body">
      <div class="info">
        <div class="field">
          <span class="badge ${hasWI(it)?'ok':'warn'}">${hasWI(it)?'ข้อมูลพร้อม':'ยังไม่ครบ WI'}</span>
        </div>
        <div class="field">ลูกค้า: <b>${it.customer_code || ""}</b></div>
        <div class="field">งาน: <b>${it.part_name || ""}</b></div>
        <div class="field">แพ็ค: ${okVal(it.packing_type)?it.packing_type:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
        <div class="field">สติ๊กเกอร์: ${okVal(it.label_color)?it.label_color:`<span class="missing">ยังไม่ได้ใส่</span>`}</div>
      </div>

      <div class="action-panel" onclick="event.stopPropagation()">
        <button class="${okVal(it.wi_front_url)?'on':'off'}" ${okVal(it.wi_front_url)?`onclick=\"openModal('${it.wi_front_url}')\"`:"disabled"}>WI หน้า</button>
        <button class="${okVal(it.wi_back_url)?'on':'off'}" ${okVal(it.wi_back_url)?`onclick=\"openModal('${it.wi_back_url}')\"`:"disabled"}>WI หลัง</button>
        <button class="${okVal(it.label_image_url)?'on':'off'}" ${okVal(it.label_image_url)?`onclick=\"openModal('${it.label_image_url}')\"`:"disabled"}>สติ๊กเกอร์</button>
        <button class="report-btn" onclick="openReportModal('${encodeURIComponent(JSON.stringify(it))}')">🚨 แจ้งปัญหา</button>
      </div>
    </div>
  </div>`;
}

function setActive(el){
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
}

function updateCounts(){
  sumAll.textContent = ALL_ITEMS.length;
  sumOK.textContent = ALL_ITEMS.filter(hasWI).length;
  sumNG.textContent = ALL_ITEMS.filter(i=>!hasWI(i)).length;
}

function applyFilter(){
  btnAll.classList.remove("active");
  btnOK.classList.remove("active");
  btnNG.classList.remove("active");

  let items = ALL_ITEMS;

  if(FILTER_MODE==="ok"){
    items = ALL_ITEMS.filter(hasWI);
    btnOK.classList.add("active");
  }else if(FILTER_MODE==="ng"){
    items = ALL_ITEMS.filter(i=>!hasWI(i));
    btnNG.classList.add("active");
  }else{
    btnAll.classList.add("active");
  }

  VIEW_ITEMS = items;
  list.innerHTML = "";
  VIEW_ITEMS.forEach(it=>list.insertAdjacentHTML("beforeend", card(it)));
  loadedNote.textContent = `แสดง ${VIEW_ITEMS.length} รายการ (จากทั้งหมด ${ALL_ITEMS.length})`;
}

async function loadAllPages(){
  if(fetching) return;
  fetching = true;

  offset = 0;
  finished = false;
  ALL_ITEMS = [];
  list.innerHTML = "";
  loadedNote.textContent = "กำลังโหลด...";
  updateCounts();
  applyFilter();
  showLoading();

  try{
    while(!finished){
      const r = await jsonp(API_BASE + `?action=list&limit=${LIMIT}&offset=${offset}`);
      const items = r.items || r.results || [];
      ALL_ITEMS = ALL_ITEMS.concat(items);
      offset += items.length;

      if(items.length < LIMIT) finished = true;
      await new Promise(res=>setTimeout(res, 60));
    }

    updateCounts();
    applyFilter();
  }finally{
    hideLoading();
    fetching = false;
  }
}

async function doSearch(){
  const q = qEl.value.trim();
  if(!q) return loadAllPages();

  showLoading();
  try{
    const r = await jsonp(API_BASE + "?action=search&q=" + encodeURIComponent(q));
    ALL_ITEMS = r.results || r.items || [];

    FILTER_MODE = "all";
    updateCounts();
    applyFilter();

    if(ALL_ITEMS.length === 0){
      loadedNote.textContent = "ไม่พบข้อมูล — กด 🚨 แจ้งปัญหา (งานไม่อยู่ในฐาน)";
    }
  }finally{
    hideLoading();
  }
}

function showAll(){
  qEl.value = "";
  FILTER_MODE="all";
  return loadAllPages();
}

function reloadData(){ return loadAllPages(); }

// EVENTS
btnSearch.onclick = doSearch;
btnShowAll.onclick = showAll;
btnReload.onclick = reloadData;

btnAll.onclick = ()=>{ FILTER_MODE="all"; applyFilter(); };
btnOK.onclick = ()=>{ FILTER_MODE="ok"; applyFilter(); };
btnNG.onclick = ()=>{ FILTER_MODE="ng"; applyFilter(); };

btnReportMain.onclick = openReportModalManual;

qEl.addEventListener("keydown",(e)=>{ if(e.key==="Enter") doSearch(); });

// START
loadAllPages();
</script>

</body>
</html>
